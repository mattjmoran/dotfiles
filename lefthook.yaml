pre-commit:
  parallel: true
  commands:
    dprint:
      glob:
        - "*.{json,yaml,toml,md,sh}"
        - ".mise/tasks/**/*"
      run: mise exec -- dprint check {staged_files}
    rumdl:
      glob: "*.md"
      run: mise exec -- rumdl check {staged_files}
    shellcheck:
      glob: ".mise/tasks/**/*"
      run: mise run lint:shell
    chezmoi:
      glob: "home/**/*.tmpl"
      run: mise run lint:chezmoi

commit-msg:
  commands:
    conventional-commit:
      run: mise exec -- cog verify --file {1}
